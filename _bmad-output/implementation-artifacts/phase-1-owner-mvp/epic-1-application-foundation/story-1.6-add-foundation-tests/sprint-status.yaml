phase: "Phase 1: Owner MVP"
epic: "Epic 1: Application Foundation"
story:
  id: "1.6"
  title: "Add Foundation Tests"
output_type: "sprint-status.yaml"
workflow_step: "Amelia: sprint-planning"
status_snapshot: "Planned before development"
final_delivery_status: "Implemented / Delivered"

sprint_goal: >
  Add automated foundation tests that prove the package credit calculation works
  for supported packages and rejects unsupported package sizes.

story_scope:
  in_scope:
    - "Add package credit calculation tests."
    - "Use Node's built-in test runner."
    - "Validate supported package sizes."
    - "Validate invalid package rejection."
  out_of_scope:
    - "Route tests."
    - "Database setup tests."
    - "Browser tests."
    - "Full owner workflow tests."

deliverables:
  - "tests/customer-balance.test.js"
  - "npm test foundation coverage"

risks:
  - id: "R1"
    description: "Tests assert stale package rules."
    mitigation: "Use delivered rule values."
  - id: "R2"
    description: "Tests require unnecessary database setup."
    mitigation: "Test pure function directly."

dependencies:
  prerequisite_stories:
    - "Story 1.5: Implement Package Credit Calculation"
  technical_dependencies:
    - "node:test"
    - "node:assert/strict"
    - "package.json test script"

planned_files:
  create:
    - "tests/customer-balance.test.js"
  modify:
    - "package.json"

planned_routes:
  new_routes: []
  affected_routes: []

planned_database_changes:
  schema_changes: []
  data_changes: []

planned_tests:
  automated:
    - "10 cup package credits 11 total cups."
    - "20 cup package credits 22 total cups."
    - "30 cup package credits 33 total cups."
    - "Invalid package size is rejected."

completion_criteria:
  - "Foundation tests exist."
  - "npm test runs them."
  - "All package credit cases pass."

planning_explanation: |
  Story 1.6 was planned to establish a small but meaningful automated test
  baseline. Because package credits affect balances, the earliest foundation
  tests focused on the pure credit calculation. Testing the model directly kept
  the tests fast, deterministic, and independent of routes or database setup.
