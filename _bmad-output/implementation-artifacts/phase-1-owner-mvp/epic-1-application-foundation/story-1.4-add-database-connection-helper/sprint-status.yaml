    - "database/migrations.js uses runStatement and getAllRows."
    - "models/admin-user.js uses getRow and runStatement."
    - "models/customer-account.js uses database helpers."
    - "models/package-purchase.js uses database helpers."
    - "models/delivery-history.js uses database helpers."
    - "models/dashboard.js uses database helpers."
    - "Automated tests use explicit database paths and helper-backed app setup."

