planning_explanation: |
  Story 1.4 was planned as a small but important foundation story. The Owner MVP needs consistent database behavior because every major workflow depends on SQLite: admin login, customer creation, package purchases, delivery recording, delivery voiding, dashboard metrics, customer portal views, and shared access links.

  The sprint goal was to prevent duplicated database plumbing. Without a helper, every model or setup script might open SQLite differently, forget foreign key enforcement, or handle errors inconsistently. That would create maintenance risk in a ledger-style application where data reliability is central to user trust.

  The planned helper was intentionally simple. It would not be an ORM and would not contain product business rules. It would provide four practical functions: open the database, run a statement, read one row, and read many rows. This matches the app's MVP scale and keeps SQL behavior visible.

  The most important technical requirement was foreign key enforcement. SQLite requires foreign keys to be enabled on each connection. The helper therefore needed to run PRAGMA foreign_keys = ON whenever a database connection is opened. This supports relationships between admins, customers, package purchases, and deliveries.

  Testability was also a major planning concern. Tests should not mutate the real local app database. The helper needed to allow explicit database path overrides so automated tests could use temporary SQLite files. The delivered application follows this pattern across the test suite.

  The story would be complete when database/database.js exported the helper functions, used config.databasePath by default, accepted explicit overrides, enabled foreign keys, logged low-level SQLite errors, and stayed free of membership business rules.
