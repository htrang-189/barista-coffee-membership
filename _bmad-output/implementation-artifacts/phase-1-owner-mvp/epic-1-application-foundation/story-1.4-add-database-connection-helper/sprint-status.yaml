phase: "Phase 1: Owner MVP"
epic: "Epic 1: Application Foundation"
story:
  id: "1.4"
  title: "Add Database Connection Helper"
output_type: "sprint-status.yaml"
workflow_step: "Amelia: sprint-planning"
status_snapshot: "Planned before development"
final_delivery_status: "Implemented / Delivered"

sprint_goal: >
  Add a reusable SQLite database connection helper so setup scripts, migrations,
  models, and tests can open the configured database consistently, enforce
  foreign keys, and perform basic query operations without duplicating database
  plumbing.

story_scope:
  in_scope:
    - "Create the database connection helper module."
    - "Open the configured SQLite database by default."
    - "Allow an explicit database path override for tests and controlled contexts."
    - "Enable SQLite foreign key enforcement on opened connections."
    - "Provide a reusable statement execution helper."
    - "Provide a reusable single-row query helper."
    - "Provide a reusable multi-row query helper."
    - "Log low-level SQLite errors consistently."
    - "Export helper functions for setup scripts, migrations, models, and tests."
  out_of_scope:
    - "Creating or changing database schema."
    - "Adding business-specific model functions."
    - "Implementing admin authentication."
    - "Implementing customer management."
    - "Implementing package purchase logic."
    - "Implementing delivery logic."
    - "Implementing dashboard metrics."
    - "Adding routes or UI components."
    - "Adding an ORM or external database infrastructure."

deliverables:
  - "database/database.js"
  - "openDatabase(databasePath)"
  - "runStatement(database, sql, params, callback)"
  - "getRow(database, sql, params, callback)"
  - "getAllRows(database, sql, params, callback)"
  - "Foreign key enforcement through PRAGMA foreign_keys = ON."
  - "Consistent SQLite error logging."
  - "Support for configured database path from config.js."
  - "Support for explicit database path override."

risks:
  - id: "R1"
    description: "Every model opens SQLite independently."
    impact: "Connection behavior becomes inconsistent and harder to maintain."
    mitigation: "Centralize connection behavior in database/database.js."
  - id: "R2"
    description: "Foreign key constraints are defined but not enforced."
    impact: "Orphaned package or delivery records could enter the ledger."
    mitigation: "Run PRAGMA foreign_keys = ON when the database opens."
  - id: "R3"
    description: "Query errors are swallowed."
    impact: "Database failures become hard to diagnose."
    mitigation: "Log SQLite errors and pass them back through callbacks."
  - id: "R4"
    description: "The helper becomes too abstract or business-specific."
    impact: "Small MVP database access becomes harder to understand."
    mitigation: "Limit helper to opening the database and basic query operations."
  - id: "R5"
    description: "Tests mutate the real local database."
    impact: "Tests become unsafe or flaky."
    mitigation: "Allow explicit database path overrides for test databases."

